server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;

    # Assets con hash en el nombre → cache agresivo (1 año)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API → backend (nombre de servicio Compose)
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Mayor al timeout de gunicorn (120s) para no cortar embeddings largos
        proxy_read_timeout    130s;
        proxy_connect_timeout 10s;
    }

    # Health check (sin prefijo /api/)
    location /health/ {
        proxy_pass       http://backend:8000/health/;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # SPA fallback → React Router maneja el routing en el cliente
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
